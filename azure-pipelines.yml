trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  # Using the repo URL from your latest version
  repoUrl: 'https://github.com/yezhan58-oss/e08g09t07-odoo17.git'
  # Ensure the file in GitHub is named 'update.sh'
  updateScript: '/home/is214/deploy-temp/update.sh'
  stagePath: '/home/is214/'

stages:

# =========================
# STAGING STAGE
# =========================
- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                cd $(stagePath)
                rm -rf deploy-temp
                git clone -b $(Build.SourceBranchName) $(repoUrl) deploy-temp --quiet
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)


# =========================
# PRODUCTION STAGE
# =========================
- stage: Production
  displayName: Deploy to Production
  condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: "Sync Code - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                cd $(stagePath)
                rm -rf deploy-temp
                git clone -b $(Build.SourceBranchName) $(repoUrl) deploy-temp --quiet
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          - task: SSH@0
            displayName: "Uncompress odoo.sql.gz on VM"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                cd /home/is214/deploy-temp/
                # This task will fail if odoo.sql.gz is not in your GitHub repo!
                gunzip -c odoo.sql.gz > odoo.sql

          - task: SSH@0
            displayName: "Restore Database"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' cp /home/is214/deploy-temp/restore_db.sh /tmp/
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' cp /home/is214/deploy-temp/odoo.sql /tmp/
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x /tmp/restore_db.sh
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' /tmp/restore_db.sh "odoo17" "odoo" "/tmp/odoo.sql"

          - task: SSH@0
            displayName: "Run Update Script - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)
