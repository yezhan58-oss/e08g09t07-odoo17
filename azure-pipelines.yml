trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/yezhan58-oss/e08g09t07-odoo17.git'
  updateScript: '/home/is214/deploy-temp/update_code.sh'
  stagePath: '/home/is214/'

stages:

# =========================
# STAGING STAGE (Leave as is)
# =========================
- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')
  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: "Sync Code"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                cd /home/is214/
                rm -rf deploy-temp
                git clone -b $(Build.SourceBranchName) $(repoUrl) deploy-temp --quiet
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github
          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)

# =========================
# PRODUCTION STAGE (Updated for Docker)
# =========================
- stage: Production
  displayName: Deploy to Production
  condition: eq(variables['Build.SourceBranchName'], 'master')
  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:
          - task: SSH@0
            displayName: "Sync Code"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                cd /home/is214/
                rm -rf deploy-temp
                git clone -b $(Build.SourceBranchName) $(repoUrl) deploy-temp --quiet
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          # --- DATABASE RESTORE (COMMENTED OUT FOR SAFETY) ---
