trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/souravb-smu/odoo17.git'
  stagePath: '/home/azureuser/'
  updateScript: '$(stagePath)/deploy-temp/update_code.sh'
  dbName: 'odoo'
  dbUser: 'odoo17'

stages:

# =========================
# STAGING STAGE
# =========================
- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                rm -rf deploy-temp *-odoo17
                git clone -b Staging $(repoUrl) --quiet
                mv *-odoo17 deploy-temp
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)

# =========================
# PRODUCTION STAGE
# =========================
- stage: Production
  displayName: Deploy to Production
  condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                rm -rf deploy-temp odoo17
                git clone -b master $(repoUrl) --quiet
                mv odoo17 deploy-temp
                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          # Upload compressed SQL
          - task: CopyFilesOverSSH@0
            displayName: "Upload odoo.sql.gz to VM"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              sourceFolder: '$(Agent.TempDirectory)'
              contents: 'odoo.sql.gz'
              targetFolder: '$(stagePath)/deploy-temp'

          # Uncompress SQL on VM
          - task: SSH@0
            displayName: "Uncompress odoo.sql.gz on VM"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                cd $(stagePath)/deploy-temp
                echo "Uncompressing odoo.sql.gz..."
                gunzip -c odoo.sql.gz > odoo.sql
                echo "Uncompress complete: $(stagePath)/deploy-temp/odoo.sql"

          # Restore Database
          - task: SSH@0
            displayName: "Restore Database - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                set -e
                export PGPASSWORD=$(DB_PASSWORD)
                cd $(stagePath)/deploy-temp
                echo "Dropping database if exists..."
                psql -U $(dbUser) -d postgres -c "DROP DATABASE IF EXISTS $(dbName);"
                echo "Creating database..."
                psql -U $(dbUser) -d postgres -c "CREATE DATABASE $(dbName) OWNER $(dbUser);"
                echo "Restoring database from uncompressed SQL..."
                psql -U $(dbUser) -d $(dbName) -f odoo.sql
                echo "Database restore completed!"

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-production'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)